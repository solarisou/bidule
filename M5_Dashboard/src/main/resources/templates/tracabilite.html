<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>NavalCraft – Traçabilité</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background: #f0f4f8; }
        .chain-badge { font-size: .75rem; }
        /* combobox commande */
        #cmd-dropdown { position:absolute; z-index:1050; background:#fff; border:1px solid #ced4da;
                        border-radius:.375rem; max-height:280px; overflow-y:auto; width:100%; display:none; }
        #cmd-dropdown .cmd-item { padding:6px 12px; cursor:pointer; font-size:.9rem; }
        #cmd-dropdown .cmd-item:hover, #cmd-dropdown .cmd-item.active { background:#e9ecef; }
        #cmd-dropdown .cmd-item mark { background:#ffe066; padding:0; border-radius:2px; }
        .tbl-sort { cursor:pointer; user-select:none; white-space:nowrap; }
        .tbl-sort .si { font-size:.75rem; opacity:.5; margin-left:4px; }
        .tbl-sort.asc .si::after  { content:'↑'; opacity:1; }
        .tbl-sort.desc .si::after { content:'↓'; opacity:1; }
        .tbl-sort:not(.asc):not(.desc) .si::after { content:'⇅'; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid py-4">

    <h2 class="fw-bold mb-1">Traçabilité commande</h2>
    <p class="text-muted mb-4">Chaîne complète : Client → Commande → Ordre de fabrication → Matière → Fournisseur</p>

    <!-- Sélecteur -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/tracabilite" id="trace-form" class="row g-2 align-items-end">
                <!-- hidden input qui sera soumis -->
                <input type="hidden" name="cmd" id="cmd-hidden" th:value="${selectedCmd}"/>
                <div class="col-auto" style="min-width:380px;">
                    <label class="form-label fw-semibold">Rechercher une commande</label>
                    <div class="position-relative">
                        <input type="text" id="cmd-search" class="form-control"
                               placeholder="🔍 ID ou nom du client..."
                               autocomplete="off"
                               th:value="${selectedCmd != null ? selectedCmd : ''}"/>
                        <div id="cmd-dropdown"></div>
                    </div>
                    <!-- données injectées par Thymeleaf, lues par JS -->
                    <select id="cmd-source" class="d-none">
                        <option value="">-- Choisir --</option>
                        <option th:each="c : ${commandes}"
                                th:value="${c['id']}"
                                th:text="${c['id'] + ' — ' + c['client']}"
                                th:selected="${c['id'] == selectedCmd}">
                        </option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Tracer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Résultat -->
    <div th:if="${chaine != null}">

        <div th:if="${!#lists.isEmpty(chaine)}" class="alert alert-info mb-3 py-2">
            <strong th:text="${chaine[0]['client']}"></strong>
            — Commande <strong th:text="${chaine[0]['commande_id']}"></strong>
            — Statut :
            <span th:text="${chaine[0]['cmd_statut']}"
                  th:class="${chaine[0]['cmd_statut'] == 'LIVREE'   ? 'badge bg-success' :
                              chaine[0]['cmd_statut'] == 'EN_COURS' ? 'badge bg-warning text-dark' :
                              'badge bg-secondary'}"></span>
            — Montant : <strong th:text="${chaine[0]['montant'] + ' €'}"></strong>
        </div>

        <div class="card shadow-sm">
            <div class="card-header fw-bold" style="background:#e3f2fd;">Détail de la chaîne</div>
            <div class="card-body">
                <div id="ctrl-chaine"></div>
                <table id="tbl-chaine" class="table table-hover table-sm w-100">
                    <thead class="table-dark">
                        <tr>
                            <th class="tbl-sort">Ordre de fab.<span class="si"></span></th>
                            <th class="tbl-sort">Statut OF<span class="si"></span></th>
                            <th class="tbl-sort">Code matière<span class="si"></span></th>
                            <th class="tbl-sort">Matière<span class="si"></span></th>
                            <th class="tbl-sort">Fournisseur<span class="si"></span></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${chaine}">
                            <td th:text="${row['ordre_id']}"></td>
                            <td>
                                <span th:text="${row['ordre_statut']}"
                                      th:class="${row['ordre_statut'] == 'TERMINE'  ? 'badge bg-success chain-badge' :
                                                 row['ordre_statut'] == 'EN_COURS' ? 'badge bg-warning text-dark chain-badge' :
                                                 row['ordre_statut'] == 'PLANIFIE' ? 'badge bg-info text-dark chain-badge' :
                                                 'badge bg-secondary chain-badge'}"></span>
                            </td>
                            <td><code th:text="${row['matiere_code']}"></code></td>
                            <td th:text="${row['matiere_nom']}"></td>
                            <td th:text="${row['fournisseur']}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(chaine)}">
                            <td colspan="5" class="text-center text-muted">Aucune donnée pour cette commande</td>
                        </tr>
                    </tbody>
                </table>
                <div id="pag-chaine"></div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function TableManager(cfg) {
    var tbl=document.getElementById(cfg.tableId),ctrlEl=document.getElementById(cfg.ctrlId),pagEl=document.getElementById(cfg.pagId);
    if(!tbl||!ctrlEl||!pagEl)return;
    var tbody=tbl.querySelector('tbody'),allRows=Array.from(tbody.querySelectorAll('tr')),filtered=allRows.slice();
    var page=1,pageSize=cfg.pageSize||25,sortCol=cfg.sortCol!==undefined?cfg.sortCol:0,sortDir=cfg.sortDir||'asc';

    ctrlEl.innerHTML='<div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">'
      +'<div class="d-flex align-items-center gap-2"><span class="text-muted small">Afficher</span>'
      +'<select id="ps-'+cfg.tableId+'" class="form-select form-select-sm" style="width:80px">'
      +'<option value="10">10</option><option value="25" selected>25</option>'
      +'<option value="50">50</option><option value="100">100</option><option value="-1">Tous</option></select>'
      +'<span class="text-muted small">entrées</span></div>'
      +'<input type="text" id="sq-'+cfg.tableId+'" class="form-control form-control-sm"'
      +' placeholder="🔍 Recherche globale..." style="max-width:260px"></div>';

    document.getElementById('ps-'+cfg.tableId).addEventListener('change',function(){pageSize=parseInt(this.value);page=1;render();});
    document.getElementById('sq-'+cfg.tableId).addEventListener('input',function(){page=1;filterRender();});

    var ths=tbl.querySelectorAll('thead .tbl-sort');
    ths.forEach(function(th,i){
        th.addEventListener('click',function(){
            if(sortCol===i)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=i;sortDir='asc';}
            ths.forEach(function(t){t.classList.remove('asc','desc');});th.classList.add(sortDir);page=1;filterRender();
        });
    });
    if(ths[sortCol])ths[sortCol].classList.add(sortDir);

    function cellText(r,c){return r.cells[c]?r.cells[c].textContent.trim():'';}
    function filterRender(){
        var q=document.getElementById('sq-'+cfg.tableId).value.toLowerCase();
        filtered=allRows.filter(function(r){return!q||r.textContent.toLowerCase().includes(q);});
        filtered.sort(function(a,b){
            var va=cellText(a,sortCol),vb=cellText(b,sortCol),na=parseFloat(va),nb=parseFloat(vb);
            var c=(!isNaN(na)&&!isNaN(nb))?na-nb:va.localeCompare(vb,'fr');return sortDir==='asc'?c:-c;
        });render();
    }
    function render(){
        var total=filtered.length,ps=pageSize===-1?total:pageSize,tp=Math.max(1,ps>0?Math.ceil(total/ps):1);
        page=Math.min(Math.max(1,page),tp);
        var from=(page-1)*(pageSize===-1?total:ps),to=pageSize===-1?total:Math.min(from+ps,total);
        allRows.forEach(function(r){r.style.display='none';});
        filtered.forEach(function(r,i){r.style.display=(i>=from&&i<to)?'':'none';tbody.appendChild(r);});
        renderPag(from+(total>0?1:0),to,total,tp);
    }
    function renderPag(from,to,total,tp){
        var info='<span class="text-muted small">Affichage de '+(total?from:0)+' à '+to+' sur '+total+' entrées</span>';
        var btns='<ul class="pagination pagination-sm mb-0">';
        btns+=li(page-1,'‹',page===1);
        var lo=Math.max(1,page-2),hi=Math.min(tp,page+2);
        if(lo>1){btns+=li(1,'1');if(lo>2)btns+='<li class="page-item disabled"><span class="page-link">…</span></li>';}
        for(var p=lo;p<=hi;p++)btns+=li(p,p,false,p===page);
        if(hi<tp){if(hi<tp-1)btns+='<li class="page-item disabled"><span class="page-link">…</span></li>';btns+=li(tp,tp);}
        btns+=li(page+1,'›',page===tp)+'</ul>';
        pagEl.innerHTML='<div class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2">'+info+'<nav>'+btns+'</nav></div>';
        pagEl.querySelectorAll('[data-p]').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();page=parseInt(this.dataset.p);render();});});
    }
    function li(p,label,disabled,active){
        if(disabled)return'<li class="page-item disabled"><span class="page-link">'+label+'</span></li>';
        if(active)return'<li class="page-item active"><span class="page-link">'+label+'</span></li>';
        return'<li class="page-item"><a class="page-link" href="#" data-p="'+p+'">'+label+'</a></li>';
    }
    filterRender();
}
TableManager({tableId:'tbl-chaine', ctrlId:'ctrl-chaine', pagId:'pag-chaine', sortCol:0, sortDir:'asc'});

/* ── Combobox recherche de commande ── */
(function () {
    var src    = document.getElementById('cmd-source');
    var input  = document.getElementById('cmd-search');
    var hidden = document.getElementById('cmd-hidden');
    var drop   = document.getElementById('cmd-dropdown');
    var form   = document.getElementById('trace-form');
    if (!src || !input || !drop) return;

    /* construire la liste [{value, label}] depuis le <select> caché */
    var options = Array.from(src.options).filter(function(o){ return o.value; })
                       .map(function(o){ return {value: o.value, label: o.text}; });

    /* si une commande est déjà sélectionnée, afficher son label */
    if (hidden.value) {
        var cur = options.find(function(o){ return o.value === hidden.value; });
        if (cur) input.value = cur.label;
    }

    function highlight(text, q) {
        if (!q) return text;
        var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
        return text.replace(re, '<mark>$1</mark>');
    }

    function showDrop(q) {
        var lq = q.toLowerCase();
        var matches = options.filter(function(o){ return o.label.toLowerCase().includes(lq); }).slice(0, 100);
        if (!matches.length) { drop.style.display = 'none'; return; }
        drop.innerHTML = matches.map(function(o){
            return '<div class="cmd-item" data-val="' + o.value + '">' + highlight(o.label, q) + '</div>';
        }).join('');
        drop.style.display = 'block';
        drop.querySelectorAll('.cmd-item').forEach(function(el){
            el.addEventListener('mousedown', function(e){
                e.preventDefault();
                input.value  = el.textContent;
                hidden.value = el.dataset.val;
                drop.style.display = 'none';
            });
        });
    }

    input.addEventListener('input', function(){ hidden.value = ''; showDrop(this.value); });
    input.addEventListener('focus', function(){ if (this.value) showDrop(this.value); });
    input.addEventListener('blur',  function(){ setTimeout(function(){ drop.style.display='none'; }, 150); });

    /* soumettre en appuyant Entrée ou Tab si un seul résultat */
    input.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && hidden.value) { form.submit(); }
        if (e.key === 'Escape') { drop.style.display = 'none'; }
    });

    /* fermer si clic ailleurs */
    document.addEventListener('click', function(e){
        if (!input.contains(e.target) && !drop.contains(e.target)) drop.style.display = 'none';
    });
})();
</script>
</body>
</html>
