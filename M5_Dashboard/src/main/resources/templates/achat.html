<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>NavalCraft – Achat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background: #f0f4f8; }
        .tbl-sort { cursor:pointer; user-select:none; white-space:nowrap; }
        .tbl-sort .si { font-size:.75rem; opacity:.5; margin-left:4px; }
        .tbl-sort.asc .si::after  { content:'↑'; opacity:1; }
        .tbl-sort.desc .si::after { content:'↓'; opacity:1; }
        .tbl-sort:not(.asc):not(.desc) .si::after { content:'⇅'; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid py-4">
    <h2 class="fw-bold mb-1">M2 — Service Achat</h2>
    <p class="text-muted mb-4">Fournisseurs et bons de commande</p>

    <!-- Fournisseurs -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-bold" style="background:#fff3e0;">Fournisseurs</div>
        <div class="card-body">
            <!-- contrôles injectés par JS -->
            <div id="ctrl-fournisseurs"></div>
            <table id="tbl-fournisseurs" class="table table-hover table-sm w-100">
                <thead class="table-dark">
                    <tr>
                        <th class="tbl-sort">ID<span class="si"></span></th>
                        <th class="tbl-sort">Nom<span class="si"></span></th>
                        <th class="tbl-sort">Contact<span class="si"></span></th>
                        <th class="tbl-sort">Email<span class="si"></span></th>
                        <th class="tbl-sort">Délai (j)<span class="si"></span></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${fournisseurs}">
                        <td th:text="${f['id']}"></td>
                        <td th:text="${f['nom']}"></td>
                        <td th:text="${f['contact']}"></td>
                        <td th:text="${f['email']}"></td>
                        <td th:text="${f['delai']}"></td>
                    </tr>
                </tbody>
            </table>
            <div id="pag-fournisseurs"></div>
        </div>
    </div>

    <!-- Bons de commande -->
    <div class="card shadow-sm">
        <div class="card-header fw-bold d-flex justify-content-between align-items-center" style="background:#fff3e0;">
            <span>Bons de commande</span>
            <small class="text-muted fw-normal">1 000 plus récents sur 5 000</small>
        </div>
        <div class="card-body">
            <div id="ctrl-bons"></div>
            <table id="tbl-bons" class="table table-hover table-sm w-100">
                <thead class="table-dark">
                    <tr>
                        <th class="tbl-sort">ID<span class="si"></span></th>
                        <th class="tbl-sort">Statut<span class="si"></span></th>
                        <th class="tbl-sort">Date<span class="si"></span></th>
                        <th class="tbl-sort">Fournisseur<span class="si"></span></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="bc : ${bonsCommande}">
                        <td th:text="${bc['id']}"></td>
                        <td>
                            <span th:text="${bc['statut']}"
                                  th:class="${bc['statut'] == 'LIVREE' ? 'badge bg-success' : 'badge bg-warning text-dark'}"></span>
                        </td>
                        <td th:text="${bc['date']}"></td>
                        <td th:text="${bc['fournisseur']}"></td>
                    </tr>
                </tbody>
            </table>
            <div id="pag-bons"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── TableManager : search + sort + pagination en vanilla JS ── */
function TableManager(cfg) {
    var tbl    = document.getElementById(cfg.tableId);
    var ctrlEl = document.getElementById(cfg.ctrlId);
    var pagEl  = document.getElementById(cfg.pagId);
    if (!tbl || !ctrlEl || !pagEl) return;

    var tbody    = tbl.querySelector('tbody');
    var allRows  = Array.from(tbody.querySelectorAll('tr'));
    var filtered = allRows.slice();
    var page     = 1;
    var pageSize = cfg.pageSize || 25;
    var sortCol  = cfg.sortCol  !== undefined ? cfg.sortCol : 0;
    var sortDir  = cfg.sortDir  || 'asc';

    /* ── barre de contrôle ── */
    ctrlEl.innerHTML =
        '<div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">'
      + '  <div class="d-flex align-items-center gap-2">'
      + '    <span class="text-muted small">Afficher</span>'
      + '    <select id="ps-' + cfg.tableId + '" class="form-select form-select-sm" style="width:80px">'
      + '      <option value="10">10</option>'
      + '      <option value="25" selected>25</option>'
      + '      <option value="50">50</option>'
      + '      <option value="100">100</option>'
      + '      <option value="-1">Tous</option>'
      + '    </select>'
      + '    <span class="text-muted small">entrées</span>'
      + '  </div>'
      + '  <input type="text" id="sq-' + cfg.tableId + '" class="form-control form-control-sm"'
      + '         placeholder="🔍 Recherche globale..." style="max-width:260px">'
      + '</div>';

    document.getElementById('ps-' + cfg.tableId).addEventListener('change', function () {
        pageSize = parseInt(this.value); page = 1; render();
    });
    document.getElementById('sq-' + cfg.tableId).addEventListener('input', function () {
        page = 1; filterRender();
    });

    /* ── en-têtes triables ── */
    var ths = tbl.querySelectorAll('thead .tbl-sort');
    ths.forEach(function (th, i) {
        th.addEventListener('click', function () {
            if (sortCol === i) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
            else               { sortCol = i; sortDir = 'asc'; }
            ths.forEach(function (t) { t.classList.remove('asc','desc'); });
            th.classList.add(sortDir);
            page = 1; filterRender();
        });
    });
    if (ths[sortCol]) ths[sortCol].classList.add(sortDir);

    /* ── fonctions internes ── */
    function cellText(row, col) {
        return row.cells[col] ? row.cells[col].textContent.trim() : '';
    }

    function filterRender() {
        var q = document.getElementById('sq-' + cfg.tableId).value.toLowerCase();
        filtered = allRows.filter(function (r) {
            return !q || r.textContent.toLowerCase().includes(q);
        });
        filtered.sort(function (a, b) {
            var va = cellText(a, sortCol), vb = cellText(b, sortCol);
            var na = parseFloat(va),       nb = parseFloat(vb);
            var cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : va.localeCompare(vb, 'fr');
            return sortDir === 'asc' ? cmp : -cmp;
        });
        render();
    }

    function render() {
        var total      = filtered.length;
        var ps         = pageSize === -1 ? total : pageSize;
        var totalPages = Math.max(1, ps > 0 ? Math.ceil(total / ps) : 1);
        page           = Math.min(Math.max(1, page), totalPages);
        var from       = (page - 1) * (pageSize === -1 ? total : ps);
        var to         = pageSize === -1 ? total : Math.min(from + ps, total);

        allRows.forEach(function (r) { r.style.display = 'none'; });
        filtered.forEach(function (r, i) {
            r.style.display = (i >= from && i < to) ? '' : 'none';
            tbody.appendChild(r);
        });
        renderPag(from + (total > 0 ? 1 : 0), to, total, totalPages);
    }

    function renderPag(from, to, total, totalPages) {
        var info = '<span class="text-muted small">Affichage de ' + (total ? from : 0)
                 + ' à ' + to + ' sur ' + total + ' entrées</span>';

        var btns = '<ul class="pagination pagination-sm mb-0">';
        btns += li(page - 1, '‹', page === 1);
        var lo = Math.max(1, page - 2), hi = Math.min(totalPages, page + 2);
        if (lo > 1)          { btns += li(1,'1'); if (lo>2) btns += '<li class="page-item disabled"><span class="page-link">…</span></li>'; }
        for (var p = lo; p <= hi; p++) btns += li(p, p, false, p === page);
        if (hi < totalPages) { if (hi<totalPages-1) btns += '<li class="page-item disabled"><span class="page-link">…</span></li>'; btns += li(totalPages, totalPages); }
        btns += li(page + 1, '›', page === totalPages);
        btns += '</ul>';

        pagEl.innerHTML = '<div class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2">'
                        + info + '<nav>' + btns + '</nav></div>';

        pagEl.querySelectorAll('[data-p]').forEach(function (a) {
            a.addEventListener('click', function (e) {
                e.preventDefault();
                page = parseInt(this.dataset.p); render();
            });
        });
    }

    function li(p, label, disabled, active) {
        if (disabled) return '<li class="page-item disabled"><span class="page-link">' + label + '</span></li>';
        if (active)   return '<li class="page-item active"><span class="page-link">' + label + '</span></li>';
        return '<li class="page-item"><a class="page-link" href="#" data-p="' + p + '">' + label + '</a></li>';
    }

    filterRender();
}

/* ── initialisation des 2 tableaux ── */
TableManager({ tableId:'tbl-fournisseurs', ctrlId:'ctrl-fournisseurs', pagId:'pag-fournisseurs', sortCol:0, sortDir:'asc'  });
TableManager({ tableId:'tbl-bons',         ctrlId:'ctrl-bons',         pagId:'pag-bons',         sortCol:2, sortDir:'desc' });
</script>
</body>
</html>
